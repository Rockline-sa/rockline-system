  return s;
};

/* =========================================================
   4. API CLIENT
========================================================= */
async function api(path, { method = 'GET', body, headers = {} } = {}) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...headers },
    credentials: 'include',
  };
  if (body !== undefined) opts.body = JSON.stringify(body);

  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, opts);
  } catch (e) {
    throw new Error(t('networkError'));
  }

  let data = null;
  try { data = await res.json(); } catch {}

  if (res.status === 401 && path !== '/auth/login' && path !== '/auth/refresh' && path !== '/auth/me') {
    // Try to refresh once
    const refreshed = await tryRefresh();
    if (refreshed) {
      return api(path, { method, body, headers }); // retry
    }
    state.user = null;
    state.page = 'login';
    render();
    throw new Error('Session expired');
  }

  if (!res.ok) {
    const msg = data?.error || `HTTP ${res.status}`;
    throw new Error(msg);
  }

  return data;
}

let refreshing = null;
async function tryRefresh() {
  if (refreshing) return refreshing;
  refreshing = (async () => {
    try {
      const res = await fetch(`${API_BASE}/auth/refresh`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
      });
      if (res.ok) {
        const data = await res.json();
        state.user = data.user;
        return true;
      }
    } catch {}
    return false;
  })();
  const result = await refreshing;
  refreshing = null;
  return result;
}

  const s = STATUS_STYLES[status] || STATUS_STYLES.PENDING;

  return `

/* =========================================================
   6. TOAST
========================================================= */
function toast(msg, type = 'success') {
  const colors = {
    success: 'bg-emerald-600 text-white',
    error:   'bg-rose-600 text-white',
    info:    'bg-slate-800 text-white',
  };
  const icons = { success: 'check', error: 'x', info: 'info' };
  const el = document.createElement('div');
  el.className = `${colors[type]} px-4 py-2.5 rounded-xl shadow-lg fade-in flex items-center gap-2 text-sm font-medium pointer-events-auto`;
  el.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i><span>${escapeHtml(msg)}</span>`;
  document.getElementById('toast-root').appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s'; el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

========================================================= */

  document.documentElement.lang = state.lang;
  document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.classList.toggle('dark', state.theme === 'dark');
}

function render() {
  applyHtmlAttributes();

  if (!state.authChecked) {
    $app.innerHTML = `<div class="min-h-screen grid place-items-center"><div class="animate-pulse text-slate-400">${t('appName')}</div></div>`;
    return;
  }

  if (!state.user) {
    $app.innerHTML = renderAuthShell();
    bindEvents();
    if (window.lucide) lucide.createIcons();
    return;
  }

  $app.innerHTML = `
    ${renderTopBar()}
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      ${renderTabs()}
      <div id="page-content" class="mt-6 fade-in">${renderPage()}</div>
    </main>
  `;
  bindEvents();
  if (window.lucide) lucide.createIcons();
}

function renderTabs() {
  const isAdmin = state.user.role === 'ADMIN';
  const tabs = [

    { key: 'quotes',   label: isAdmin ? t('allQuotes') : t('quotes'),   icon: 'file-text' },
    ...(isAdmin

/* =========================================================
   10. PAGES
========================================================= */
function renderPage() {
  switch (state.page) {
    case 'overview': return renderOverview();
    case 'orders':   return renderOrdersPage();
    case 'quotes':   return renderQuotesPage();
    case 'new':      return renderNewOrderPage();
    case 'clients':  return renderClientsPage();
    case 'settings': return renderSettingsPage();
    default:         return renderOverview();
  }
}

/* ----- Overview ----- */
function renderOverview() {
  if (!state.stats) {
    setTimeout(loadStats, 0);
    return loadingSkeleton();
  }
  const c = state.stats.counts;
  const isAdmin = state.user.role === 'ADMIN';

  const cards = [
    { label: t('totalOrders'),    value: fmt(c.totalOrders),                    icon: 'package',    tone: 'brand' },
    { label: t('inTransit'),      value: fmt(c.inTransit),                       icon: 'truck',      tone: 'indigo' },
    { label: t('deliveredOrders'),value: fmt(c.delivered),                       icon: 'check-check',tone: 'emerald' },
    { label: t('pendingQuotes'),  value: fmt(c.pendingQuotes),                   icon: 'file-text',  tone: 'amber' },
    { label: t('totalRevenue'),   value: `${fmt(c.totalRevenue)} ${t('currency')}`, icon: 'trending-up', tone: 'emerald', wide: true },
    ...(isAdmin ? [{ label: t('totalClients'), value: fmt(c.totalClients), icon: 'users', tone: 'brand' }] : []),
  ];

  return `
    <div class="space-y-6">
      <!-- Welcome -->
      <div class="card p-5 sm:p-6">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div>
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">${t('welcome')}, <span class="text-brand-600 dark:text-brand-400">${escapeHtml(state.user.companyName)}</span></h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${isAdmin ? t('appSubtitle') : t('getStarted')}</p>
          </div>
          ${isAdmin
            ? `<button data-action="open-create-quote" class="btn btn-primary"><i data-lucide="plus" class="w-4 h-4"></i>${t('createQuote')}</button>`
            : `<button data-action="goto" data-page="new" class="btn btn-primary"><i data-lucide="plus" class="w-4 h-4"></i>${t('requestNew')}</button>`}
        </div>
      </div>

      <!-- Stat cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        ${cards.map(c => `
          <div class="card p-5 ${c.wide ? 'col-span-2' : ''}">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-sm text-slate-500 dark:text-slate-400">${c.label}</div>
                <div class="text-2xl font-bold mt-2 tracking-tight">${c.value}</div>
              </div>
              <div class="w-10 h-10 grid place-items-center rounded-lg ${
                c.tone === 'brand' ? 'bg-brand-50 text-brand-600 dark:bg-brand-500/15 dark:text-brand-300' :
                c.tone === 'indigo' ? 'bg-indigo-50 text-indigo-600 dark:bg-indigo-500/15 dark:text-indigo-300' :
                c.tone === 'amber' ? 'bg-amber-50 text-amber-600 dark:bg-amber-500/15 dark:text-amber-300' :
                'bg-emerald-50 text-emerald-600 dark:bg-emerald-500/15 dark:text-emerald-300'
              }">
                <i data-lucide="${c.icon}" class="w-5 h-5"></i>
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Recent orders -->
      <div class="card overflow-hidden">
        <div class="flex items-center justify-between p-5 border-b border-slate-200 dark:border-slate-800">
          <h2 class="font-semibold">${t('recent')}</h2>
          <button data-action="goto" data-page="orders" class="text-sm text-brand-600 dark:text-brand-400 hover:underline">${t('viewAll')}</button>
        </div>
        ${(!state.stats.recentOrders || !state.stats.recentOrders.length) ? renderEmpty('package', t('noOrders'), t('noOrdersDesc')) : `
          <div class="divide-y divide-slate-100 dark:divide-slate-800">
            ${state.stats.recentOrders.map(o => `
              <button data-action="open-order" data-id="${o.id}" class="w-full text-start p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition flex items-center gap-4">
                <div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-800 grid place-items-center shrink-0">
                  <i data-lucide="${STATUS_STYLES[o.status]?.icon || 'package'}" class="w-4 h-4 text-slate-600 dark:text-slate-400"></i>
                </div>
                <div class="flex-1 min-w-0">

                    ${isAdmin && o.user ? `<span class="text-xs text-slate-500">·</span><span class="text-xs text-slate-500 truncate">${escapeHtml(o.user.companyName)}</span>` : ''}

/* ----- New order form ----- */
function renderNewOrderPage() {
  if (!window._draft) window._draft = { items: [{ productName: '', quantity: 1, unitPrice: 0 }], notes: '' };
  const draft = window._draft;
  const subtotal = calcTotal(draft.items.map(i => ({ quantity: i.quantity, unitPrice: i.unitPrice })));
  const tax = subtotal * 0.15;
  const total = subtotal + tax;

  return `
    <div class="max-w-3xl mx-auto">
      <div class="mb-6">
        <h1 class="text-xl font-bold">${t('requestNew')}</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${t('appSubtitle')}</p>
      </div>

      <div class="card p-5 sm:p-6 space-y-5">
        <div>
          <label class="text-sm font-medium mb-2 block">${t('items')}</label>
          <div class="space-y-2" id="items-container">
            ${draft.items.map((it, idx) => itemRow(it, idx)).join('')}
          </div>
          <button data-action="add-item" class="btn btn-ghost mt-3 text-sm">
            <i data-lucide="plus" class="w-4 h-4"></i>${t('addItem')}
          </button>
        </div>

        <div>
          <label class="text-sm font-medium mb-2 block">${t('orderNotes')}</label>

function openModal(content) {
  $modal.innerHTML = `
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-slate-900/50 fade-in" data-modal-backdrop>
      <div class="w-full max-w-2xl max-h-[90vh] overflow-y-auto nice-scroll bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800" onclick="event.stopPropagation()">
        ${content}
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  $modal.innerHTML = '';
  document.body.style.overflow = '';
}

async function openOrderModal(id) {
  try {
    const { order } = await api(`/orders/${id}`);
    showOrderModal(order);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function showOrderModal(o) {
  const isAdmin = state.user.role === 'ADMIN';
  const events = o.events || [];

  // Build timeline: show all flow steps that are reached + any side events
  const reached = new Set();
  events.forEach(e => reached.add(e.status));
  const isCancelled = o.status === 'CANCELLED' || o.status === 'RETURNED';

  // Find current index in flow
  const currentIdx = ORDER_FLOW.indexOf(o.status);
  const timelineHtml = `
    <div class="space-y-0">
      ${ORDER_FLOW.map((step, idx) => {
        const eventsForStep = events.filter(e => e.status === step);
        const isDone = !isCancelled && currentIdx >= 0 && idx < currentIdx;
        const isCurrent = !isCancelled && idx === currentIdx;
        const isFuture = !isDone && !isCurrent;
        const dotClass = isDone ? 'done' : isCurrent ? 'current' : '';
        const lastEvent = eventsForStep[eventsForStep.length - 1];

        return `
          <div class="timeline-step">
            <div class="timeline-dot ${dotClass}">
              ${isDone ? '<i data-lucide="check" class="w-3.5 h-3.5"></i>' :
                isCurrent ? `<i data-lucide="${STATUS_STYLES[step]?.icon || 'circle'}" class="w-3.5 h-3.5"></i>` :
                `<i data-lucide="circle" class="w-3.5 h-3.5 text-slate-400"></i>`}
            </div>
            <div class="${isFuture ? 'opacity-50' : ''}">
              <div class="font-medium text-sm">${t(step)}</div>
              ${lastEvent ? `
                <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${fmtDateTime(lastEvent.createdAt)}</div>
                ${lastEvent.message ? `<div class="text-xs text-slate-600 dark:text-slate-300 mt-1">${escapeHtml(lastEvent.message)}</div>` : ''}
                ${lastEvent.location ? `<div class="text-xs text-slate-500 mt-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${escapeHtml(lastEvent.location)}</div>` : ''}
              ` : ''}
            </div>
          </div>
        `;
      }).join('')}
      ${isCancelled ? `
        <div class="timeline-step">
          <div class="timeline-dot cancelled"><i data-lucide="x" class="w-3.5 h-3.5"></i></div>
          <div>
            <div class="font-medium text-sm text-rose-600 dark:text-rose-400">${t(o.status)}</div>
            ${events.filter(e => e.status === o.status).map(e => `
              <div class="text-xs text-slate-500 mt-0.5">${fmtDateTime(e.createdAt)}</div>
              <div class="text-xs text-slate-600 dark:text-slate-300 mt-1">${escapeHtml(e.message)}</div>
            `).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;

  // Admin status update controls
  const adminControls = isAdmin && !isCancelled ? `
    <div class="border-t border-slate-200 dark:border-slate-800 p-5">
      <div class="font-medium text-sm mb-3">${t('updateStatus')}</div>
      <div class="flex flex-wrap gap-2 mb-3">
        ${ORDER_FLOW.map(s => `
          <button data-action="set-order-status" data-id="${o.id}" data-status="${s}"
            class="px-3 py-1.5 text-xs rounded-full border transition ${o.status === s ? 'bg-brand-600 text-white border-brand-600' : 'border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}">${t(s)}</button>
        `).join('')}
        <button data-action="set-order-status" data-id="${o.id}" data-status="CANCELLED"
          class="px-3 py-1.5 text-xs rounded-full border transition ${o.status === 'CANCELLED' ? 'bg-rose-600 text-white border-rose-600' : 'border-rose-200 text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-500/10'}">${t('CANCELLED')}</button>
      </div>
      <button data-action="open-tracking-form" data-id="${o.id}" class="text-xs text-brand-600 dark:text-brand-400 hover:underline">
        <i data-lucide="truck" class="w-3 h-3 inline-block ${state.lang==='ar'?'ml-1':'mr-1'}"></i>${t('addTracking')}
      </button>
    </div>
  ` : '';

  // Client cancel button (only PENDING/CONFIRMED)
  const clientControls = !isAdmin && (o.status === 'PENDING' || o.status === 'CONFIRMED') ? `
    <div class="border-t border-slate-200 dark:border-slate-800 p-5">
      <button data-action="cancel-order" data-id="${o.id}" class="btn btn-ghost text-rose-600 dark:text-rose-400 border-rose-200 dark:border-rose-500/30">
        <i data-lucide="x-circle" class="w-4 h-4"></i>${t('cancelOrder')}
      </button>
    </div>
  ` : '';

  openModal(`
    <div class="p-5 sm:p-6 border-b border-slate-200 dark:border-slate-800 flex items-start justify-between gap-4">
      <div>
        <div class="text-xs text-slate-500 dark:text-slate-400">${t('orderDetails')}</div>
        <h2 class="text-xl font-bold mt-0.5">${o.orderNumber}</h2>
        <div class="text-sm text-slate-500 dark:text-slate-400 mt-1">${escapeHtml(o.user?.companyName || '')} · ${fmtDate(o.createdAt)}</div>
      </div>
      <div class="flex items-start gap-2">
        ${statusBadge(o.status)}
        <button data-action="close-modal" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <div class="p-5 sm:p-6 space-y-5">
      <!-- Items -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs text-slate-500 dark:text-slate-400">
            <tr>
              <th class="text-start font-medium pb-2">${t('product')}</th>
              <th class="text-start font-medium pb-2 w-16">${t('qty')}</th>
              <th class="text-start font-medium pb-2 w-24">${t('price')}</th>
              <th class="text-end font-medium pb-2 w-28">${t('subtotal')}</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
            ${(o.items || []).map(it => `
              <tr>
                <td class="py-2.5">${escapeHtml(it.productName)}</td>
                <td class="py-2.5">${fmt(it.quantity)}</td>
                <td class="py-2.5">${fmt(it.unitPrice)} ${t('currency')}</td>
                <td class="py-2.5 text-end font-medium">${fmt(it.subtotal)} ${t('currency')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- Totals -->
      <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 space-y-1.5 text-sm">
        <div class="flex items-center justify-between text-slate-600 dark:text-slate-400"><span>${t('subtotal')}</span><span>${fmt(o.subtotal)} ${t('currency')}</span></div>
        <div class="flex items-center justify-between text-slate-600 dark:text-slate-400"><span>${t('tax')}</span><span>${fmt(o.taxAmount)} ${t('currency')}</span></div>
        <div class="pt-2 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between font-bold text-base"><span>${t('total')}</span><span>${fmt(o.total)} ${t('currency')}</span></div>
      </div>

      <!-- Shipment info -->
      ${(o.trackingNumber || o.carrier || o.estimatedDelivery) ? `
        <div class="p-4 rounded-xl bg-blue-50 dark:bg-blue-500/10 border border-blue-100 dark:border-blue-500/20 space-y-1.5 text-sm">
          <div class="flex items-center gap-2 text-blue-900 dark:text-blue-200 font-medium mb-1">
            <i data-lucide="truck" class="w-4 h-4"></i>${t('shipmentInfo')}
          </div>
          ${o.carrier ? `<div class="flex items-center justify-between"><span class="text-blue-700/70 dark:text-blue-300/70">${t('carrier')}</span><span class="text-blue-900 dark:text-blue-100 font-medium">${escapeHtml(o.carrier)}</span></div>` : ''}
          ${o.trackingNumber ? `<div class="flex items-center justify-between"><span class="text-blue-700/70 dark:text-blue-300/70">${t('trackingNumber')}</span><span class="text-blue-900 dark:text-blue-100 font-mono">${escapeHtml(o.trackingNumber)}</span></div>` : ''}
          ${o.estimatedDelivery ? `<div class="flex items-center justify-between"><span class="text-blue-700/70 dark:text-blue-300/70">${t('estimatedDelivery')}</span><span class="text-blue-900 dark:text-blue-100">${fmtDate(o.estimatedDelivery)}</span></div>` : ''}
        </div>
      ` : ''}

      <!-- Notes -->
      ${o.notes ? `
        <div class="p-3 rounded-lg bg-amber-50 dark:bg-amber-500/10 border border-amber-100 dark:border-amber-500/20">
          <div class="text-xs text-amber-700 dark:text-amber-400 font-medium mb-1">${t('notes')}</div>
          <div class="text-sm text-amber-900 dark:text-amber-100">${escapeHtml(o.notes)}</div>
        </div>
      ` : ''}

      <!-- Linked quote -->
      ${o.linkedQuote ? `
        <div class="text-sm">
          <span class="text-slate-500 dark:text-slate-400">${t('linkedQuote')}:</span>
          <button data-action="open-quote" data-id="${o.linkedQuote.id}" class="text-brand-600 dark:text-brand-400 hover:underline ms-1 font-medium">${o.linkedQuote.quoteNumber}</button>
        </div>
      ` : ''}

      <!-- Timeline -->
      <div>
        <div class="font-medium text-sm mb-3">${t('trackingTimeline')}</div>
        ${timelineHtml}
      </div>
    </div>

    ${adminControls}
    ${clientControls}
  `);
}

  `);
}

async function openCreateQuoteModal(presetClientId, presetClientName) {
  // Need clients list (admin)
  if (!state.clients.length) {
    try { await loadClients(); } catch {}
  }

  const draft = {
    userId: presetClientId || (state.clients[0]?.id || ''),
    items: [{ productName: '', quantity: 1, unitPrice: 0 }],
    notes: '',
    validDays: 30,
  };
  window._quoteDraft = draft;

  const renderQuoteModal = () => {
    const subtotal = calcTotal(draft.items.map(i => ({ quantity: i.quantity, unitPrice: i.unitPrice })));
    const tax = subtotal * 0.15;
    const total = subtotal + tax;

    openModal(`
      <div class="p-5 sm:p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="text-xl font-bold">${t('createQuote')}</h2>
        <button data-action="close-modal" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="p-5 sm:p-6 space-y-5">
        <div class="grid sm:grid-cols-3 gap-3">
          <div class="sm:col-span-2">
            <label class="text-sm font-medium mb-1.5 block">${t('selectClient')}</label>
            <select class="field" id="qd-client">
              ${state.clients.map(c => `<option value="${c.id}" ${c.id === draft.userId ? 'selected' : ''}>${escapeHtml(c.companyName)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-sm font-medium mb-1.5 block">${t('validDays')}</label>
            <input class="field" id="qd-valid" type="number" min="1" max="365" value="${draft.validDays}" />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium mb-2 block">${t('items')}</label>
          <div class="space-y-2" id="qd-items">
            ${draft.items.map((it,idx) => `
              <div class="grid grid-cols-12 gap-2 items-center">
                <input type="text" class="field col-span-12 sm:col-span-5" data-qd-fld="productName" data-qd-idx="${idx}" placeholder="${escapeHtml(t('productName'))}" value="${escapeHtml(it.productName)}" />
                <input type="number" min="1" class="field col-span-4 sm:col-span-2" data-qd-fld="quantity" data-qd-idx="${idx}" value="${it.quantity}" />
                <input type="number" min="0" step="0.01" class="field col-span-6 sm:col-span-3" data-qd-fld="unitPrice" data-qd-idx="${idx}" value="${it.unitPrice}" />
                <div class="col-span-2 flex justify-end">
                  <button data-action="qd-remove" data-qd-idx="${idx}" class="w-9 h-9 grid place-items-center rounded-lg text-slate-400 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-500/10">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
          <button data-action="qd-add" class="btn btn-ghost mt-3 text-sm"><i data-lucide="plus" class="w-4 h-4"></i>${t('addItem')}</button>
        </div>

        <div>
          <label class="text-sm font-medium mb-1.5 block">${t('notes')}</label>
          <textarea class="field" id="qd-notes" rows="2">${escapeHtml(draft.notes)}</textarea>
        </div>

        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 space-y-1.5 text-sm">
          <div class="flex items-center justify-between text-slate-600 dark:text-slate-400"><span>${t('subtotal')}</span><span>${fmt(subtotal)} ${t('currency')}</span></div>
          <div class="flex items-center justify-between text-slate-600 dark:text-slate-400"><span>${t('tax')}</span><span>${fmt(tax)} ${t('currency')}</span></div>
          <div class="pt-2 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between font-bold text-base"><span>${t('total')}</span><span>${fmt(total)} ${t('currency')}</span></div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button data-action="close-modal" class="btn btn-ghost">${t('cancel')}</button>
          <button data-action="qd-submit" class="btn btn-primary"><i data-lucide="send" class="w-4 h-4"></i>${t('save')}</button>
        </div>
      </div>
    `);

    // Local listeners
    $modal.querySelector('#qd-client')?.addEventListener('change', e => { draft.userId = e.target.value; });
    $modal.querySelector('#qd-valid')?.addEventListener('change', e => { draft.validDays = Math.max(1, Number(e.target.value) || 30); });
    $modal.querySelector('#qd-notes')?.addEventListener('input', e => { draft.notes = e.target.value; });

    $modal.querySelectorAll('[data-qd-fld]').forEach(el => {
      el.addEventListener('input', e => {
        const idx = +e.target.dataset.qdIdx;
        const fld = e.target.dataset.qdFld;
        draft.items[idx][fld] = fld === 'productName' ? e.target.value : (Number(e.target.value) || 0);
        if (fld !== 'productName') renderQuoteModal();
      });
    });

    $modal.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', async () => {
        const a = el.dataset.action;
        if (a === 'qd-add') { draft.items.push({ productName:'', quantity:1, unitPrice:0 }); renderQuoteModal(); }
        else if (a === 'qd-remove') {
          draft.items.splice(+el.dataset.qdIdx, 1);
          if (!draft.items.length) draft.items.push({ productName:'', quantity:1, unitPrice:0 });
          renderQuoteModal();
        }
        else if (a === 'qd-submit') {
          const items = draft.items.filter(i => i.productName && i.quantity > 0);
          if (!draft.userId) { toast(t('selectAClient'), 'error'); return; }
          if (!items.length) { toast(t('addAtLeastOneItem'), 'error'); return; }
          try {
            await api('/quotes', { method: 'POST', body: { userId: draft.userId, items, notes: draft.notes, validDays: draft.validDays } });
            toast(t('orderSentSuccess'));
            closeModal();
            await Promise.all([loadQuotes(), loadStats()]);
            state.page = 'quotes';
            render();
          } catch (e) { toast(e.message, 'error'); }
        }
      });
    });
  };

  renderQuoteModal();
}

function openTrackingForm(orderId) {
  openModal(`
    <div class="p-5 sm:p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
      <h2 class="text-xl font-bold">${t('addTracking')}</h2>
      <button data-action="close-modal" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
    <form id="tracking-form" class="p-5 sm:p-6 space-y-4">
      <input type="hidden" name="orderId" value="${orderId}" />
      <div>
        <label class="text-sm font-medium mb-1.5 block">${t('carrier')}</label>
        <input class="field" name="carrier" placeholder="DHL / Aramex / SMSA..." />
      </div>
      <div>
        <label class="text-sm font-medium mb-1.5 block">${t('trackingNumber')}</label>
        <input class="field" name="trackingNumber" />
      </div>
      <div>
        <label class="text-sm font-medium mb-1.5 block">${t('estimatedDelivery')}</label>
        <input class="field" name="estimatedDelivery" type="date" />
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" data-action="close-modal" class="btn btn-ghost">${t('cancel')}</button>
        <button type="submit" class="btn btn-primary">${t('save')}</button>
      </div>
    </form>
  `);

  $modal.querySelector('#tracking-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {
      status: 'SHIPPED', // also bumps to shipped if not already
      carrier: fd.get('carrier') || undefined,
      trackingNumber: fd.get('trackingNumber') || undefined,
      message: 'Shipment dispatched',
    };
    const ed = fd.get('estimatedDelivery');
    if (ed) body.estimatedDelivery = new Date(ed).toISOString();
    try {
      await api(`/orders/${orderId}/status`, { method: 'PATCH', body });
      toast(t('statusUpdated'));
      closeModal();
      await Promise.all([loadOrders(), loadStats()]);
      openOrderModal(orderId);
    } catch (e) { toast(e.message, 'error'); }
  });
}

/* =========================================================
   12. DATA LOADERS
========================================================= */
async function loadStats() {
  try {
    const data = await api('/stats/overview');
    state.stats = data;
    if (state.page === 'overview') render();
  } catch (e) { toast(e.message, 'error'); }
}

async function loadOrders() {
  try {
    const { orders } = await api('/orders');
    state.orders = orders;
    if (state.page === 'orders' || state.page === 'overview') render();
  } catch (e) { toast(e.message, 'error'); }
}

async function loadQuotes() {
  try {
    const { quotes } = await api('/quotes');
    state.quotes = quotes;
    if (state.page === 'quotes') render();
  } catch (e) { toast(e.message, 'error'); }
}

async function loadClients() {
  if (state.user?.role !== 'ADMIN') return;
  try {
    const { users } = await api('/users');
    state.clients = users;
    if (state.page === 'clients') render();
  } catch (e) { toast(e.message, 'error'); }
}

async function loadAll() {
  await Promise.all([loadStats(), loadOrders(), loadQuotes(), loadClients()]);
}

/* =========================================================
   13. EVENT BINDING
========================================================= */
function bindEvents() {
  // Click delegation
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });

  // Login form
  const loginForm = document.getElementById('login-form');
  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        const data = await api('/auth/login', { method: 'POST', body: { username: fd.get('username'), password: fd.get('password') } });
        state.user = data.user;
        state.page = 'overview';
        render();
        loadAll();
      } catch (err) {
        toast(err.message || t('invalidCredentials'), 'error');
      }
    });
  }

  // Register form
  const regForm = document.getElementById('register-form');
  if (regForm) {
    regForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      try {
        const data = await api('/auth/register', { method: 'POST', body });
        state.user = data.user;
        state.page = 'overview';
        render();
        loadAll();
      } catch (err) {
        toast(err.message, 'error');
      }
    });
  }

  // Profile/password forms (settings page)
  const profileForm = document.getElementById('profile-form');
  if (profileForm) {
    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target).entries());
      try {
        const { user } = await api('/users/me', { method: 'PATCH', body });
        state.user = { ...state.user, ...user };
        toast(t('profileUpdated'));
        render();
      } catch (err) { toast(err.message, 'error'); }
    });
  }
  const passForm = document.getElementById('password-form');
  if (passForm) {
    passForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target).entries());
      try {
        await api('/users/me/password', { method: 'POST', body });
        toast(t('passwordChanged'));
        e.target.reset();
      } catch (err) { toast(err.message, 'error'); }
    });
  }

  // Draft form inputs (live update)
  document.querySelectorAll('[data-fld]').forEach(el => {
    el.addEventListener('input', (e) => {
      const idx = +e.target.dataset.idx;
      const fld = e.target.dataset.fld;
      const val = fld === 'productName' ? e.target.value : (Number(e.target.value) || 0);
      window._draft.items[idx][fld] = val;
      if (fld !== 'productName') updateDraftTotals();
    });
  });
  const notes = document.getElementById('draft-notes');
  if (notes) notes.addEventListener('input', (e) => { window._draft.notes = e.target.value; });

  // Close user menu when clicking outside
  document.addEventListener('click', closeUserMenuIfOutside, { once: true, capture: true });
}

function closeUserMenuIfOutside(e) {
  const menu = document.getElementById('user-menu');
  if (!menu) return;
  if (!e.target.closest('[data-action="toggle-user-menu"]') && !e.target.closest('#user-menu')) {
    menu.classList.add('hidden');
  }
  // Re-bind for next click
  document.addEventListener('click', closeUserMenuIfOutside, { once: true, capture: true });
}

function updateDraftTotals() {
  const sub = calcTotal(window._draft.items.map(i => ({ quantity: i.quantity, unitPrice: i.unitPrice })));
  const tax = sub * 0.15;
  const total = sub + tax;
  document.getElementById('draft-subtotal').textContent = `${fmt(sub)} ${t('currency')}`;
  document.getElementById('draft-tax').textContent = `${fmt(tax)} ${t('currency')}`;
  document.getElementById('draft-total').textContent = `${fmt(total)} ${t('currency')}`;
}

async function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  switch (action) {
    case 'goto-login':    state.page = 'login'; render(); break;
    case 'goto-register': state.page = 'register'; render(); break;
    case 'goto':          state.page = el.dataset.page; render(); if (state.page === 'orders') loadOrders(); else if (state.page === 'quotes') loadQuotes(); else if (state.page === 'clients') loadClients(); else if (state.page === 'overview') loadStats(); break;
    case 'toggle-theme':  state.theme = state.theme === 'dark' ? 'light' : 'dark'; savePrefs(); render(); break;
    case 'toggle-lang':   state.lang = state.lang === 'ar' ? 'en' : 'ar'; savePrefs(); render(); break;
    case 'toggle-user-menu': {
      e.stopPropagation();
      document.getElementById('user-menu')?.classList.toggle('hidden');
      break;
    }
    case 'logout': {
      try { await api('/auth/logout', { method: 'POST' }); } catch {}
      state.user = null;
      state.orders = []; state.quotes = []; state.clients = []; state.stats = null;
      state.page = 'login';
      render();
      break;
    }
    case 'open-order':    openOrderModal(el.dataset.id); break;
    case 'open-quote':    openQuoteModal(el.dataset.id); break;
    case 'close-modal':   closeModal(); break;

    case 'add-item':
      window._draft.items.push({ productName:'', quantity:1, unitPrice:0 });
      render();
      break;
    case 'remove-item':
      window._draft.items.splice(+el.dataset.idx, 1);
      if (!window._draft.items.length) window._draft.items.push({ productName:'', quantity:1, unitPrice:0 });
      render();
      break;
    case 'cancel-draft':
      window._draft = { items:[{productName:'',quantity:1,unitPrice:0}], notes:'' };
      state.page = 'overview';
      render();
      break;
    case 'submit-draft': {
      const items = window._draft.items
        .filter(i => i.productName && i.quantity > 0)
        .map(i => ({ productName: i.productName, quantity: Number(i.quantity), unitPrice: Number(i.unitPrice) }));
      if (!items.length) { toast(t('addAtLeastOneItem'), 'error'); return; }
      try {
        await api('/orders', { method: 'POST', body: { items, notes: window._draft.notes } });
        toast(t('orderSentSuccess'));
        window._draft = { items:[{productName:'',quantity:1,unitPrice:0}], notes:'' };
        await Promise.all([loadOrders(), loadStats()]);
        state.page = 'orders';
        render();
      } catch (err) { toast(err.message, 'error'); }
      break;
    }

    case 'set-order-status': {
      const status = el.dataset.status;
      try {
        await api(`/orders/${el.dataset.id}/status`, { method: 'PATCH', body: { status } });
        toast(t('statusUpdated'));
        await Promise.all([loadOrders(), loadStats()]);
        openOrderModal(el.dataset.id);
      } catch (err) { toast(err.message, 'error'); }
      break;
    }
    case 'cancel-order': {
      if (!confirm(t('confirmCancel'))) return;
      try {
        await api(`/orders/${el.dataset.id}/cancel`, { method: 'POST' });
        toast(t('orderCancelled'));
        closeModal();
        await Promise.all([loadOrders(), loadStats()]);
      } catch (err) { toast(err.message, 'error'); }
      break;
    }
    case 'open-tracking-form': openTrackingForm(el.dataset.id); break;

    case 'quote-respond': {
      try {
        await api(`/quotes/${el.dataset.id}/respond`, { method: 'POST', body: { response: el.dataset.resp } });
        toast(el.dataset.resp === 'ACCEPTED' ? t('quoteAccepted') : t('quoteRejected'));
        closeModal();
        await Promise.all([loadQuotes(), loadStats()]);
      } catch (err) { toast(err.message, 'error'); }
      break;
    }
    case 'convert-quote': {
      try {
        await api(`/quotes/${el.dataset.id}/convert`, { method: 'POST' });
        toast(t('orderSentSuccess'));
        closeModal();
        await Promise.all([loadOrders(), loadQuotes(), loadStats()]);
        state.page = 'orders';
        render();
      } catch (err) { toast(err.message, 'error'); }
      break;
    }
    case 'open-create-quote':
      openCreateQuoteModal();
      break;
    case 'open-create-quote-for':
      openCreateQuoteModal(el.dataset.clientId, el.dataset.clientName);
      break;
  }
}

// Modal close handlers
document.addEventListener('click', (e) => {
  if (e.target.dataset.modalBackdrop !== undefined) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

/* =========================================================
   14. BOOT
========================================================= */
async function boot() {
  // Try to refresh session on load
  try {
    const { user } = await api('/auth/me');
    state.user = user;
  } catch {
    const refreshed = await tryRefresh();
    if (refreshed) {
      try {
        const { user } = await api('/auth/me');
        state.user = user;
      } catch {}
    }
  }

  state.authChecked = true;
  if (state.user) {
    state.page = 'overview';
    render();
    loadAll();
  } else {
    state.page = 'login';
    render();
  }
}

boot();
</script>
